<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="container" style="padding:40px;">

<h1>The Khabar Thread</h1>

<h2>Admin Dashboard</h2>

<hr><br>

<h3>Welcome Admin 🎉</h3>
<hr><br>

<form id="newsForm">

<label>News Title</label><br>
<input type="text" id="title" required><br><br>

<label>Category</label><br>
<select id="category">

<option>भारत</option>
<option>उत्तर प्रदेश</option>
<option>राजनीति</option>
<option>दुनिया</option>
<option>खेल</option>
<option>टेक</option>

</select>

<br><br>

<label>Summary</label><br>

<textarea id="summary" rows="3"></textarea>

<br><br>

<label>Thumbnail</label><br>

<input type="file" id="image">

<br><br>

<label>Full Article</label><br>

<textarea id="content" rows="10"></textarea>

<br><br>

<button class="read-btn" type="submit">

Publish News

</button>

</form>

<hr><br>

<button id="logoutBtn" class="read-btn">

Logout

</button>

<p>अब यहीं से पूरी वेबसाइट कंट्रोल होगी।</p>

<br>

<button id="logoutBtn" class="read-btn">
Logout
</button>

</div>

<script type="module" src="../js/dashboard.js"></script>

</body>

</html>
