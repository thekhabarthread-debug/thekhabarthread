<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add News</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="container">

<h1>The Khabar Thread CMS</h1>

<h2>Add News</h2>

<form id="newsForm">

<label>News Title</label>
<input type="text" id="title" required>

<label>Category</label>

<select id="category">

<option>भारत</option>
<option>उत्तर प्रदेश</option>
<option>राजनीति</option>
<option>दुनिया</option>
<option>खेल</option>
<option>टेक</option>

</select>

<label>Summary</label>

<textarea id="summary" rows="3"></textarea>

<label>News Image</label>

<input
type="file"
id="image"
accept="image/*"
required>

<label>Full Article</label>

<textarea id="content" rows="10"></textarea>

<button type="submit" class="read-btn">

Publish News

</button>

</form>

<br>

<a href="dashboard.html" class="read-btn">

← Dashboard

</a>

</div>

<script type="module" src="../js/add-news.js"></script>

</body>
</html>
